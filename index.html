    :root {
      --blue: #0a1628; --gold: #c9a84c; --gold-l: #e8c96a;
      --usa: #3a7bd5; --mex: #2da44e; --can: #d63b3b;
      --surface: #111c2e; --surface2: #18263d; --border: rgba(201,168,76,0.18);
      --text: #e8e8e8; --muted: #7a90a8; --panel: 340px;
    }
    html, body { height: 100%; background: var(--blue); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

    /* HEADER */
    header {
      position: relative; z-index: 1001; background: var(--blue);
      border-bottom: 1px solid var(--border);
      padding: 11px 18px; display: flex; align-items: center;
      justify-content: space-between; gap: 12px; flex-wrap: wrap;
    }
    .hdr-left { display: flex; align-items: center; gap: 12px; }
    .hdr-left h1 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--gold-l); }
    .hdr-left p { font-size: 10px; color: var(--muted); letter-spacing: 1.4px; text-transform: uppercase; margin-top: 1px; }
    .legend { display: flex; gap: 14px; flex-wrap: wrap; }
    .leg { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); font-weight: 500; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .d-usa { background: var(--usa); } .d-mex { background: var(--mex); } .d-can { background: var(--can); }

    /* STATS */
    .stats { position: relative; z-index: 1000; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: center; }
    .stat { padding: 8px 22px; text-align: center; border-right: 1px solid var(--border); }
    .stat:last-child { border-right: none; }
    .sn { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); letter-spacing: 1px; line-height: 1; }
    .sl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 1px; }

    /* MAIN LAYOUT */
    .main { display: flex; height: calc(100vh - 93px); }

    /* SCHEDULE PANEL */
    #panel {
      width: var(--panel); flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      overflow: hidden; transition: width 0.25s ease;
    }
    #panel.collapsed { width: 0; }

    .panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab {
      flex: 1; padding: 9px 4px; font-size: 10px; font-weight: 600; text-align: center;
      letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted);
      cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s;
      white-space: nowrap;
    }
    .tab.active { color: var(--gold-l); border-bottom-color: var(--gold); }
    .tab:hover:not(.active) { color: var(--text); }

    .panel-search {
      padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .panel-search input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 12px;
      font-family: inherit; outline: none;
    }
    .panel-search input::placeholder { color: var(--muted); }
    .panel-search input:focus { border-color: var(--gold); }

    #schedule-list { overflow-y: auto; flex: 1; }
    #schedule-list::-webkit-scrollbar { width: 4px; }
    #schedule-list::-webkit-scrollbar-track { background: transparent; }
    #schedule-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .stage-header {
      padding: 10px 12px 5px; font-size: 9px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold);
      border-bottom: 1px solid var(--border); position: sticky; top: 0;
      background: var(--surface); z-index: 2;
    }

    .match-card {
      padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer; transition: background 0.12s;
    }
    .match-card:hover { background: var(--surface2); }
    .match-card.highlight { background: rgba(201,168,76,0.08); }

    .mc-date { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
    .mc-teams {
      font-size: 13px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; justify-content: space-between; gap: 4px;
    }
    .mc-score {
      font-family: 'Bebas Neue', sans-serif; font-size: 16px;
      color: var(--gold-l); letter-spacing: 1px; white-space: nowrap;
    }
    .mc-venue { font-size: 10px; color: var(--muted); margin-top: 3px; }
    .mc-group { font-size: 9px; color: var(--muted); font-weight: 600; letter-spacing: 0.8px; }

    .badge-final   { display:inline-block; padding:1px 6px; border-radius:10px; font-size:9px; font-weight:700; letter-spacing:.5px; background:rgba(201,168,76,.15); color:var(--gold); border:1px solid rgba(201,168,76,.3); }
    .badge-semi    { display:inline-block; padding:1px 6px; border-radius:10px; font-size:9px; font-weight:700; background:rgba(58,123,213,.15); color:#6fa4f0; border:1px solid rgba(58,123,213,.3); }
    .badge-quarter { display:inline-block; padding:1px 6px; border-radius:10px; font-size:9px; font-weight:700; background:rgba(45,164,78,.15); color:#5dd67a; border:1px solid rgba(45,164,78,.3); }

    /* MAP */
    #map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* TOGGLE BUTTON */
    #toggle-panel {
      position: absolute; top: 86px; left: 10px; z-index: 1002;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 12px; cursor: pointer; font-size: 12px; font-weight: 600;
      color: var(--gold-l); letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px;
      transition: background 0.15s; user-select: none;
    }
    #toggle-panel:hover { background: var(--surface2); }

    /* POPUP */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important; border: 1px solid var(--border) !important;
      border-radius: 10px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important; padding: 0 !important;
    }
    .leaflet-popup-content { margin: 0 !important; min-width: 260px !important; }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-close-button { color: var(--muted) !important; font-size: 18px !important; top: 8px !important; right: 10px !important; }

    .popup-inner { padding: 14px; }
    .popup-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; margin-bottom: 5px; }
    .tag-usa { color: var(--usa); } .tag-mexico { color: var(--mex); } .tag-canada { color: var(--can); }
    .popup-name { font-family: 'Bebas Neue', sans-serif; font-size: 19px; color: var(--gold-l); letter-spacing: 1px; line-height: 1.1; }
    .popup-city { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
    .popup-hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
    .popup-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; }
    .prl { color: var(--muted); } .prv { color: var(--text); font-weight: 500; }
    .popup-matches-title { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); margin: 10px 0 6px; }
    .popup-match { font-size: 11px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; gap: 8px; }
    .popup-match:last-child { border-bottom: none; }
    .pm-info { color: var(--muted); font-size: 10px; }
    .pm-score { font-family: 'Bebas Neue', sans-serif; font-size: 13px; color: var(--gold-l); white-space: nowrap; }

    @media (max-width: 700px) {
      :root { --panel: 280px; }
      .stats .stat:nth-child(n+4) { display: none; }
    }

</head>

function makeIcon(country) {
  const c = countryColors[country];
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="42" viewBox="0 0 32 42">
    <path d="M16 0C7.2 0 0 7.2 0 16c0 11 16 26 16 26S32 27 32 16C32 7.2 24.8 0 16 0z" fill="${c}" stroke="white" stroke-width="2"/>
    <circle cx="16" cy="15" r="8" fill="white" opacity="0.2"/>
    <text x="16" y="20" text-anchor="middle" font-size="12" font-family="Arial" fill="white">⚽</text>
  </svg>`;
  return L.divIcon({ html:svg, className:'', iconSize:[32,42], iconAnchor:[16,42], popupAnchor:[0,-44] });
}

  const badgeHtml = v.note ? (() => {

  })() : '';

  const popup = `<div class="popup-inner">
    <div class="popup-tag tag-${v.country}">${v.country==='usa'?'🇺🇸 United States':v.country==='mexico'?'🇲🇽 Mexico':'🇨🇦 Canada'}</div>

    ${badgeHtml}
    <hr class="popup-hr"/>

// ── SCHEDULE PANEL ────────────────────────────────────────────────────────────
let activeTab = 'all';
let searchQuery = '';

function renderSchedule() {
  const list = document.getElementById('schedule-list');
  const q = searchQuery.toLowerCase();

  let filtered = matches.filter(m => {
    if (activeTab === 'group' && m.stage !== 'Group Stage') return false;
    if (activeTab === 'knockout' && m.stage === 'Group Stage') return false;
    if (q) {
      const searchable = `${m.home} ${m.away} ${m.venue} ${m.stage} ${m.group}`.toLowerCase();
      if (!searchable.includes(q)) return false;
    }
    return true;
  });

  // Group by stage
  const byStage = {};
  filtered.forEach(m => {
    if (!byStage[m.stage]) byStage[m.stage] = [];
    byStage[m.stage].push(m);
  });

  const stageOrder = ['Group Stage','Round of 32','Round of 16','Quarterfinals','Semifinals','3rd Place','Final'];
  let html = '';

  stageOrder.forEach(stage => {
    if (!byStage[stage]) return;
    html += `<div class="stage-header">${stage}</div>`;
    byStage[stage].forEach((m, i) => {
      const hasScore = m.score && m.score !== '—';
      const scoreHtml = hasScore ? `<span class="mc-score">${m.score}</span>` : `<span style="font-size:10px;color:var(--muted)">${m.time}</span>`;
      const grpLabel = !['R32','R16','QF','SF','3P','FINAL'].includes(m.group) ? `Group ${m.group} · ` : '';
      const badgeHtml = m.special === 'final' ? `<span class="badge-final" style="margin-left:6px">FINAL</span>` :
                        m.special === 'semi'  ? `<span class="badge-semi" style="margin-left:6px">SEMI</span>` :
                        m.special === 'quarter' ? `<span class="badge-quarter" style="margin-left:6px">QF</span>` : '';

      html += `<div class="match-card" data-venue="${m.venue}" onclick="focusVenue('${m.venue}')">
        <div class="mc-date">${m.date} · ${grpLabel}${m.venue}${badgeHtml}</div>
        <div class="mc-teams">
          <span>${m.home} vs ${m.away}</span>
          ${scoreHtml}
        </div>
      </div>`;
    });
  });

  if (!html) html = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">No matches found</div>';
  list.innerHTML = html;
}

function focusVenue(venueKey) {
  const ref = markerRefs[venueKey];
  if (!ref) return;
  map.setView([ref.venue.lat, ref.venue.lng], 8, { animate: true });
  ref.marker.openPopup();
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeTab = tab.dataset.tab;
    renderSchedule();
  });
});

// Search
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderSchedule();
});

// Toggle panel

document.getElementById('toggle-panel').addEventListener('click', () => {
  panel.classList.toggle('collapsed');

});
